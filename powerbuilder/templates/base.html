<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Powerbuilder{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'><rect width='20' height='20' rx='5' fill='%233b82f6'/><path d='M7 16.5V3.5a5.5 4 0 0 1 0 8' stroke='%23fff' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root {
      --bg-primary:    #0f1117;
      --bg-secondary:  #1a1d27;
      --bg-card:       #1e2130;
      --accent:        #3b82f6;
      --accent-hover:  #2563eb;
      --accent-glow:   rgba(59, 130, 246, 0.15);
      --text-primary:  #f1f5f9;
      --text-secondary:#94a3b8;
      --text-muted:    #475569;
      --border:        #2d3148;
      --border-accent: #3b82f6;
      --success:       #10b981;
      --warning:       #f59e0b;
      --error:         #ef4444;
    }

    /* ── Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Custom scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar        { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track  { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Focus ring ─────────────────────────────────────────────── */
    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      /* Inner halo: keeps ring visible against same-hue backgrounds. */
      box-shadow: 0 0 0 4px var(--accent-glow);
      border-radius: 4px;
    }

    /* Skip-to-content link (Milestone P) */
    .skip-to-content {
      position: absolute;
      top: -40px;
      left: 8px;
      z-index: 1000;
      padding: 0.55rem 0.9rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 6px;
      text-decoration: none;
      transition: top 120ms ease;
    }
    .skip-to-content:focus,
    .skip-to-content:focus-visible {
      top: 8px;
    }

    /* Reduced motion (Milestone P): disables animations + transitions
       for users who set the OS-level preference. Critical for
       vestibular-sensitivity users; pulse and slide animations stop. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body style="display:flex; flex-direction:column; min-height:100%;">

  <!-- Skip-to-content (Milestone P) -->
  <a href="#main-content" class="skip-to-content">Skip to content</a>

  <!-- ── Top navigation ──────────────────────────────────────────── -->
  <nav style="
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    height: 52px;
    padding: 0 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 40;
  ">
    <a href="/chat/" style="text-decoration:none; display:flex; align-items:center; gap:0.5rem;">
      <!-- Wordmark -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="20" height="20" rx="5" fill="var(--accent)"/>
        <path d="M7 16.5V3.5a5.5 4 0 0 1 0 8" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="color:var(--accent); font-weight:700; font-size:1rem; letter-spacing:-0.02em;">
        Powerbuilder
      </span>
    </a>

    <span style="
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(59,130,246,0.35);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
    ">Beta</span>
  </nav>

  <!-- ── Main content ────────────────────────────────────────────── -->
  <main id="main-content" style="flex:1; display:flex; flex-direction:column; min-height:0;">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
