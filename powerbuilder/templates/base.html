<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Powerbuilder{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'><rect width='20' height='20' rx='5' fill='%233b82f6'/><path d='M7 16.5V3.5a5.5 4 0 0 1 0 8' stroke='%23fff' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js"></script>

  <style>
    /* ── Design tokens (Milestone O: pastel light + dark) ─────────
       Palette psychology: dusty blue (trust, confidence) primary,
       sage (growth, safety) success, soft gold (clarity) highlight,
       muted terracotta (caution without alarm) warning. Every text
       pair below passes WCAG AA on its surface. */

    /* DARK is the default (matches prior look for existing users) */
    :root,
    :root[data-theme="dark"] {
      --bg-primary:        #14171C;
      --bg-secondary:      #1A1F26;
      --bg-card:           #1C2026;
      --accent:            #8FB3D9;   /* dusty blue */
      --accent-hover:      #A8C4E0;
      --accent-strong:     #6B8FB5;
      --accent-glow:       rgba(143, 179, 217, 0.16);
      --accent-soft-bg:    rgba(143, 179, 217, 0.10);
      --accent-soft-bg-2:  rgba(143, 179, 217, 0.14);
      --accent-soft-border:rgba(143, 179, 217, 0.30);
      --on-accent:         #0E1218;
      --text-primary:      #E8EAED;
      --text-secondary:    #B6BDC8;
      --text-muted:        #8A93A0;
      --border:            #2A2F38;
      --border-strong:     #3A4250;
      --surface-overlay:   rgba(255,255,255,0.04);
      --surface-overlay-2: rgba(255,255,255,0.07);
      --surface-overlay-3: rgba(255,255,255,0.02);
      --divider-dashed:    rgba(255,255,255,0.08);
      --success:           #A8D4BB;   /* sage */
      --success-soft-bg:   rgba(168, 212, 187, 0.10);
      --success-soft-border:rgba(168, 212, 187, 0.30);
      --warning:           #E0A77F;   /* muted terracotta */
      --warning-strong:    #C98A5E;
      --warning-soft-bg:   rgba(224, 167, 127, 0.10);
      --warning-soft-bg-2: rgba(224, 167, 127, 0.14);
      --warning-soft-border:rgba(224, 167, 127, 0.32);
      --error:             #F0A0A0;
      --error-soft-bg:     rgba(240, 160, 160, 0.10);
      --error-soft-bg-2:   rgba(240, 160, 160, 0.14);
      --error-soft-border: rgba(240, 160, 160, 0.32);
      --highlight:         #F0D58A;   /* soft gold */
    }

    /* LIGHT theme: warm off-white background, dusty-blue accent.
       The text palette is darker and the soft-bg overlays are
       inverted to subtle tints on white instead of whites on dark. */
    :root[data-theme="light"] {
      --bg-primary:        #F7F5EF;   /* warm off-white */
      --bg-secondary:      #EFEBE2;
      --bg-card:           #FFFFFF;
      --accent:            #3D6A99;   /* dusty blue, AA on both surfaces */
      --accent-hover:      #2F557C;
      --accent-strong:     #2F557C;
      --accent-glow:       rgba(61, 106, 153, 0.10);
      --accent-soft-bg:    rgba(61, 106, 153, 0.06);
      --accent-soft-bg-2:  rgba(61, 106, 153, 0.10);
      --accent-soft-border:rgba(61, 106, 153, 0.28);
      --on-accent:         #FFFFFF;
      --text-primary:      #1F2937;
      --text-secondary:    #3F4856;
      --text-muted:        #5B6470;
      --border:            #DCD6C7;
      --border-strong:     #BFB6A1;
      --surface-overlay:   rgba(31, 41, 55, 0.04);
      --surface-overlay-2: rgba(31, 41, 55, 0.07);
      --surface-overlay-3: rgba(31, 41, 55, 0.02);
      --divider-dashed:    rgba(31, 41, 55, 0.10);
      --success:           #3F7A5C;   /* sage, AA on light bg */
      --success-soft-bg:   rgba(63, 122, 92, 0.08);
      --success-soft-border:rgba(63, 122, 92, 0.30);
      --warning:           #A35E3A;
      --warning-strong:    #8A4D2E;
      --warning-soft-bg:   rgba(163, 94, 58, 0.08);
      --warning-soft-bg-2: rgba(163, 94, 58, 0.12);
      --warning-soft-border:rgba(163, 94, 58, 0.30);
      --error:             #B14A4A;
      --error-soft-bg:     rgba(177, 74, 74, 0.07);
      --error-soft-bg-2:   rgba(177, 74, 74, 0.10);
      --error-soft-border: rgba(177, 74, 74, 0.32);
      --highlight:         #C9A24A;
    }

    /* Auto-follow system when no manual choice has been made.
       The theme-toggle script sets data-theme="light|dark" on <html>
       and persists to localStorage; the absence of that attribute
       (or data-theme="system") means we honor prefers-color-scheme. */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]):not([data-theme="light"]) {
        --bg-primary:        #F7F5EF;
        --bg-secondary:      #EFEBE2;
        --bg-card:           #FFFFFF;
        --accent:            #3D6A99;
        --accent-hover:      #2F557C;
        --accent-strong:     #2F557C;
        --accent-glow:       rgba(61, 106, 153, 0.10);
        --accent-soft-bg:    rgba(61, 106, 153, 0.06);
        --accent-soft-bg-2:  rgba(61, 106, 153, 0.10);
        --accent-soft-border:rgba(61, 106, 153, 0.28);
        --on-accent:         #FFFFFF;
        --text-primary:      #1F2937;
        --text-secondary:    #3F4856;
        --text-muted:        #5B6470;
        --border:            #DCD6C7;
        --border-strong:     #BFB6A1;
        --surface-overlay:   rgba(31, 41, 55, 0.04);
        --surface-overlay-2: rgba(31, 41, 55, 0.07);
        --surface-overlay-3: rgba(31, 41, 55, 0.02);
        --divider-dashed:    rgba(31, 41, 55, 0.10);
        --success:           #3F7A5C;
        --success-soft-bg:   rgba(63, 122, 92, 0.08);
        --success-soft-border:rgba(63, 122, 92, 0.30);
        --warning:           #A35E3A;
        --warning-strong:    #8A4D2E;
        --warning-soft-bg:   rgba(163, 94, 58, 0.08);
        --warning-soft-bg-2: rgba(163, 94, 58, 0.12);
        --warning-soft-border:rgba(163, 94, 58, 0.30);
        --error:             #B14A4A;
        --error-soft-bg:     rgba(177, 74, 74, 0.07);
        --error-soft-bg-2:   rgba(177, 74, 74, 0.10);
        --error-soft-border: rgba(177, 74, 74, 0.32);
        --highlight:         #C9A24A;
      }
    }

    /* Smooth color transitions when the theme flips. */
    html, body, body * {
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    /* ── Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Custom scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar        { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track  { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Focus ring ─────────────────────────────────────────────── */
    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>

  <!-- Theme bootstrap: read saved preference (or system) and apply
       BEFORE first paint to avoid a light/dark flash. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('pb-theme'); // 'light' | 'dark' | 'system' | null
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
        // 'system' or null: leave attribute off so prefers-color-scheme wins.
      } catch (e) { /* localStorage may be blocked; fall back to system */ }
    })();
  </script>

  {% block head %}{% endblock %}
</head>

<body style="display:flex; flex-direction:column; min-height:100%;">

  <!-- ── Top navigation ──────────────────────────────────────────── -->
  <nav style="
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    height: 52px;
    padding: 0 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 40;
  ">
    <a href="/chat/" style="text-decoration:none; display:flex; align-items:center; gap:0.5rem;">
      <!-- Wordmark -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="20" height="20" rx="5" fill="var(--accent)"/>
        <path d="M7 16.5V3.5a5.5 4 0 0 1 0 8" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="color:var(--accent); font-weight:700; font-size:1rem; letter-spacing:-0.02em;">
        Powerbuilder
      </span>
    </a>

    <span style="
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid var(--accent-soft-border);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
    ">Beta</span>
  </nav>

  <!-- ── Main content ────────────────────────────────────────────── -->
  <main style="flex:1; display:flex; flex-direction:column; min-height:0;">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
